# Ondersteunt '&'-kleurcodes en hexcodes! Hex-formaat: <#000000>
# Gebruik $1, $2, enz. voor argumenten
general:
  prefix: "<#9753f5>[Dungeons]"
  # De itemnaam van de functie-editor tool.
  function-editor-name: "&6Functiebouwer"
  function-editor-lore:
    - "&6----------------------"
    - "&eRechtsklik op een blok"
    - "&eom een functie te maken!"
  room-editor-name: "&dKamer-editor"
  room-editor-lore:
    - "&d----------------------"
    - "&eRechtsklik selecteert eerste hoek."
    - "&eLinksklik selecteert tweede hoek."
    - ""
    - "&eRechtsklik binnen een kamer"
    - "&eom de instellingen te bewerken."
  # Welke taal gebruikt wordt voor bepaalde systeemmeldingen (zoals cooldowns).
  # Lijst met locales: https://www.oracle.com/java/technologies/javase/jdk8-jre8-suported-locales.html#util-text
  # LET OP: Niet alle vertalingen worden misschien ondersteund!
  java-locale: "nl-NL"

