name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include enough detail for maintainers to reproduce quickly.
  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I tested on the latest available release.
          required: true
        - label: I removed secrets/tokens from logs and config snippets.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide minimal steps maintainers can follow.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: dungeons_version
    attributes:
      label: Dungeons Version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft Version
      placeholder: 1.21.x
    validations:
      required: true
  - type: input
    id: server_software
    attributes:
      label: Server Software
      placeholder: Paper / Purpur / Folia
    validations:
      required: true
  - type: input
    id: java_version
    attributes:
      label: Java Version
      placeholder: "21"
    validations:
      required: true
  - type: input
    id: related_plugins
    attributes:
      label: Related Plugin Versions (Optional)
      placeholder: WorldEdit 7.x, PlaceholderAPI 2.x, etc.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Dungeon Loading / Serialization
        - Queue / Team Flow
        - Runtime Instance Lifecycle
        - Editor / Menus
        - Generation / Branching Layout
        - Triggers / Functions / Conditions
        - Loot Tables / Rewards
        - Command Handling
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Environment
      options:
        - Development
        - Staging
        - Production
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Stacktrace (Optional)
      render: shell
      description: Paste only the relevant part.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context (Optional)
      description: Config snippets, screenshots, or other helpful details.
    validations:
      required: false
